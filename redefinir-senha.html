<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Redefinir senha · Centralize</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface2: #f0f0f5;
      --border: rgba(0, 0, 0, 0.12);
      --accent: #6c63ff;
      --accent2: #5a52e0;
      --green: #16a34a;
      --red: #dc2626;
      --text: #111118;
      --text2: #555566;
      --text3: #9999aa;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);

      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;

      background: var(--surface);

      border: 1px solid var(--border);
      border-radius: 24px;

      padding: 32px;

      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.10);
    }

    .icon {
      width: 48px;
      height: 48px;

      border-radius: 14px;

      background: linear-gradient(135deg, var(--accent), #8b5cf6);

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 22px;

      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;

      letter-spacing: -0.02em;

      margin-bottom: 8px;
    }

    .description {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.5;

      margin-bottom: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;

      gap: 6px;

      margin-bottom: 16px;
    }

    label {
      font-size: 12px;
      font-weight: 700;

      color: var(--text2);

      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input {
      width: 100%;

      padding: 12px 14px;

      border: 1px solid var(--border);
      border-radius: 12px;

      background: var(--surface2);

      color: var(--text);

      font-family: 'Inter', Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;

      outline: none;

      transition: border-color .2s, box-shadow .2s;
    }

    input:focus {
      border-color: var(--accent);

      box-shadow:
        0 0 0 3px rgba(108, 99, 255, 0.1);
    }

    button {
      width: 100%;

      padding: 12px 16px;

      margin-top: 8px;

      border: none;
      border-radius: 12px;

      background: var(--accent);
      color: white;

      font-family: 'Inter', Arial, sans-serif;

      font-size: 14px;
      font-weight: 700;

      cursor: pointer;

      transition: background .2s;
    }

    button:hover {
      background: var(--accent2);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      display: none;

      padding: 12px 14px;

      margin-bottom: 16px;

      border-radius: 12px;

      font-size: 13px;
      line-height: 1.5;
    }

    .message.error {
      display: block;

      background: rgba(220, 38, 38, 0.08);
      color: var(--red);
    }

    .message.success {
      display: block;

      background: rgba(22, 163, 74, 0.08);
      color: var(--green);
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="icon">🔐</div>

    <h1>Redefinir senha</h1>

    <p class="description">
      Digite sua nova senha para acessar o Centralize.
    </p>

    <div id="message" class="message"></div>

    <div class="field">

      <label for="password">
        Nova senha
      </label>

      <input
        id="password"
        type="password"
        placeholder="Digite sua nova senha"
      >

    </div>

    <div class="field">

      <label for="confirm-password">
        Confirmar nova senha
      </label>

      <input
        id="confirm-password"
        type="password"
        placeholder="Digite novamente sua senha"
      >

    </div>

    <button id="save-button">
      Salvar nova senha
    </button>

  </div>


  <script type="module">

    import { createClient }
    from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";


    const supabase = createClient(

      "https://vspcitxnssbsztqnfhmj.supabase.co",

      "sb_publishable_4j4tzbnIkFYJHBdpvibKFg_weJPN_qS"

    );


    const passwordInput =
      document.getElementById("password");


    const confirmPasswordInput =
      document.getElementById("confirm-password");


    const saveButton =
      document.getElementById("save-button");


    const message =
      document.getElementById("message");



    function showMessage(text, type) {

      message.textContent = text;

      message.className =
        "message " + type;

    }



    saveButton.addEventListener("click", async function() {


      const password =
        passwordInput.value;


      const confirmPassword =
        confirmPasswordInput.value;



      if (!password || !confirmPassword) {

        showMessage(
          "Preencha os dois campos.",
          "error"
        );

        return;

      }



      if (password.length < 6) {

        showMessage(
          "A senha deve possuir pelo menos 6 caracteres.",
          "error"
        );

        return;

      }



      if (password !== confirmPassword) {

        showMessage(
          "As senhas não são iguais.",
          "error"
        );

        return;

      }



      saveButton.disabled = true;

      saveButton.textContent =
        "Salvando...";



      const { error } =
        await supabase.auth.updateUser({

          password: password

        });



      if (error) {

        showMessage(
          "Erro ao alterar senha: " +
          error.message,
          "error"
        );


        saveButton.disabled = false;

        saveButton.textContent =
          "Salvar nova senha";


        return;

      }



      showMessage(
        "Senha alterada com sucesso. Você será redirecionado para o login.",
        "success"
      );



      setTimeout(function() {

        window.location.href =
          "/login.html";

      }, 2500);


    });

  </script>

</body>
</html>
