<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const supabase = createClient(
    "https://vspcitxnssbsztqnfhmj.supabase.co",
    "sb_publishable_4j4tzbnIkFYJHBdpvibKFg_weJPN_qS"
  );

  const passwordInput = document.getElementById("password");
  const confirmPasswordInput = document.getElementById("confirm-password");
  const saveButton = document.getElementById("save-button");
  const message = document.getElementById("message");

  let recoverySessionReady = false;

  function showMessage(text, type) {
    message.textContent = text;
    message.className = "message " + type;
  }

  saveButton.disabled = true;
  saveButton.textContent = "Validando link...";

  async function checkRecoverySession() {
    const {
      data: { session },
      error
    } = await supabase.auth.getSession();

    if (error) {
      showMessage("Erro ao validar o link: " + error.message, "error");
      return;
    }

    if (session?.user) {
      recoverySessionReady = true;
      saveButton.disabled = false;
      saveButton.textContent = "Salvar nova senha";
      return;
    }

    showMessage(
      "O link de recuperação é inválido ou expirou. Solicite um novo e-mail.",
      "error"
    );
  }

  supabase.auth.onAuthStateChange((event, session) => {
    if (event === "PASSWORD_RECOVERY" || session?.user) {
      recoverySessionReady = true;
      saveButton.disabled = false;
      saveButton.textContent = "Salvar nova senha";
    }
  });

  saveButton.addEventListener("click", async () => {
    const password = passwordInput.value;
    const confirmPassword = confirmPasswordInput.value;

    if (!recoverySessionReady) {
      showMessage(
        "A sessão de recuperação não foi validada. Solicite um novo link.",
        "error"
      );
      return;
    }

    if (!password || !confirmPassword) {
      showMessage("Preencha os dois campos.", "error");
      return;
    }

    if (password.length < 6) {
      showMessage("A senha deve possuir pelo menos 6 caracteres.", "error");
      return;
    }

    if (password !== confirmPassword) {
      showMessage("As senhas não são iguais.", "error");
      return;
    }

    saveButton.disabled = true;
    saveButton.textContent = "Salvando...";

    const { error } = await supabase.auth.updateUser({
      password
    });

    if (error) {
      showMessage("Erro ao alterar senha: " + error.message, "error");
      saveButton.disabled = false;
      saveButton.textContent = "Salvar nova senha";
      return;
    }

    showMessage("Senha alterada com sucesso.", "success");

    await supabase.auth.signOut();

    setTimeout(() => {
      window.location.href = "/login.html";
    }, 2000);
  });

  checkRecoverySession();
</script>
