<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>CentralizaChat</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <link rel="icon" href="logo.png">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

html, body{
  overscroll-behavior:none;
  touch-action:manipulation;
  -webkit-user-select:none;
  user-select:none;
}

      body {
        overflow-x: hidden;
        background: linear-gradient(
          180deg,
          #ffffff 0%,
          #bbcdd8 35%,
          #7e7d7d 100%
        );

        color: rgb(255, 255, 255);
        font-family: Arial, Helvetica, sans-serif;
        min-height: 100vh;
      }

      .container {
        max-width: 700px;
        margin: 0 auto;
        padding: 22px 16px 120px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 26px;
      }

      .logo-full{
        display:flex;
        align-items:center;
        text-decoration:none;
        height: 70px;
      }

      .logo-full img{
        height:240px;
        width:auto;
        object-fit:contain;
        display:flex;
        margin-top: 25px;
      }

      .settings {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: white;
        font-size: 24px;
        cursor: pointer;
      }

      .stats-card {
        background: #1b1818;
        border: 1px solid rgb(255, 196, 0);
        border-radius: 26px;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
        min-height: 140px;
      }

      .stats-left {
        display: flex;
        align-items: center;
        gap: 16px;
        flex: 1;
      }

      .stats-icon {
        width: 76px;
        height: 76px;
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        box-shadow: 0 10px 24px rgba(255, 0, 0, 0.22);
        flex-shrink: 0;
      }

      .stats-info {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .stats-info h2 {
        font-size: 22px;
        line-height: 1.15;
        margin-bottom: 6px;
        font-weight: 900;
        align-items: center;
      }

      .stats-number {
        font-size: 44px;
        color: #ff2d2d;
        font-weight: 900;
        line-height: 1;


      }

      .stats-sub {
        color: #ffffff;
        margin-top: 6px;
        font-size: 15px;
      }

.refresh-btn{
  width:58px;
  height:58px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#ff2d2d,#7f0000);
  color:white;
  font-size:24px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.05),
    0 10px 25px rgba(255,0,0,.35);
  transition:.25s ease;
}

.refresh-btn:hover{
  transform:translateY(-2px) scale(1.04);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.08),
    0 16px 35px rgba(255,0,0,.45);
}

.refresh-btn:active{
  transform:scale(.96);
}

      @media (max-width: 768px) {
        .stats-card {
          padding: 16Epx;
          min-height: 120px;
          border-radius: 22px;
        }

        .stats-left {
          gap: 14px;
        }

        .stats-icon {
          width: 64px;
          height: 64px;
          border-radius: 18px;
          font-size: 28px;
        }

        .stats-info h2 {
          font-size: 18px;
          margin-bottom: 4px;
        }

        .stats-number {
          font-size: 36px;
        }

        .stats-sub {
          font-size: 13px;
          margin-top: 4px;
        }

        .refresh-btn {
          width: 60px;
          height: 60px;
          border-radius: 18px;
          font-size: 24px;
        }
      }

      .question-card {
        background: rgb(20, 20, 20);
        border-radius: 28px;
        border: 1px solid rgb(255, 0, 0);
        padding: 22px;
        margin-bottom: 22px;
      }

      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 22px;
      }

      .store {
        background: linear-gradient(135deg, #b91c1c, #7f1d1d);
        color: rgb(255, 255, 255);
        padding: 12px 18px;
        border-radius: 16px;
        font-weight: 900;
        font-size: 16px;
      }

      .status {
        background: rgba(255, 0, 0, 0.12);
        border: 1px solid rgb(255, 187, 0);
        color: #ffee00;
        padding: 12px 18px;
        border-radius: 16px;
        font-weight: 900;
      }

      .product {
        display: flex;
        gap: 18px;
        margin-bottom: 22px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .product img {
        width: 110px;
        height: 110px;
        border-radius: 20px;
        object-fit: cover;
        background: rgb(255, 255, 255);
      }

      .product-info {
        flex: 1;
      }

      .meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 15px;
        margin-bottom: 10px;
      }

      .sku {
        color: #ffffff;
      }

      .stock {
        color: #00ff5e;
        font-weight: 900;
      }

      .product-title {
        font-size: 28px;
        font-weight: 900;
        line-height: 1.2;
        margin-bottom: 12px;
      }

      .price {
        color: #00c742;
      }

      .client {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
        font-size: 22px;
        font-weight: 900;
      }

      .client-icon {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: rgb(110, 0, 0);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ff2d2d;
        font-size: 22px;
      }

      .question {
        background: rgba(255, 255, 255, 0.226);
        border: 1px solid rgba(255, 0, 0, 0);
        border-left: 5px solid #ff0000;
        border-radius: 22px;
        padding: 24px;
        line-height: 1.5;
        margin-bottom: 18px;
      }

      .meta-bottom {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        color: #ffffff;
        font-size: 16px;
        margin-bottom: 12px;
      }

      .previous {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 18px;
        padding: 18px;
        color: #ff0000;
        font-weight: 900;
        margin-bottom: 12px;
      }

      .answer-box {
        background: rgba(255, 255, 255, 0.02);
        border-radius: 24px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .answer-title {
        color: rgb(255, 255, 255);
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
        text-align: center;
      }

      textarea {
        width: 100%;
        height: 60px;
        border-radius: 20px;
        border: 1px solid rgb(255, 255, 255);
        background: #ffffff;
        color: rgb(0, 0, 0);
        padding: 14px;
        font-size: 16px;
        resize: none;
        outline: none;
      }

      textarea:focus {
        border-color: #ff2d2d;
      }

      .send-btn {
        width: 40%;
        margin-top: 14px;
        border-radius: 15px;
        border-color: #fbff0081;
        padding: 16px;
        background: linear-gradient(135deg, #640d0d, #ff0000);
        color: white;
        font-size: 18px;
        font-weight: 900;
        cursor: pointer;
        text-align: center;
        align-items: center;
      }

      .footer-menu {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(5, 8, 16, 0.96);
        border-top: 1px solid rgb(255, 255, 255);
        padding: 16px;
        display: flex;
        justify-content: space-around;
        backdrop-filter: blur(12px);
      }

      .footer-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        color: #9ca3af;
        font-size: 13px;
      }

      .footer-item.active {
        color: #ff0000;
      }

      .footer-icon {
        font-size: 24px;
      }

      @media (max-width: 768px) {
        .container {
          padding: 16px 12px 120px;
        }

        .logo {
          width: 54px;
          height: 54px;
          font-size: 24px;
        }

        .logo-text h1 {
          font-size: 26px;
        }

        .logo-text p {
          font-size: 13px;
        }

        .stats-card {
          padding: 18px;
          border-radius: 22px;
        }

        .stats-icon {
          width: 72px;
          height: 72px;
          font-size: 30px;
        }

        .stats-info h2 {
          font-size: 22px;
        }

        .stats-number {
          font-size: 42px;
        }

        .refresh-btn {
          width: 64px;
          height: 64px;
          font-size: 28px;
        }

        .question-card {
          padding: 18px;
          border-radius: 24px;
        }

        .store {
          font-size: 13px;
          padding: 10px 14px;
        }

        .status {
          font-size: 13px;
          padding: 10px 14px;
        }

        .product img {
          width: 90px;
          height: 90px;
        }

        .meta {
          font-size: 12px;
        }

        .product-title {
          font-size: 18px;
        }

        .price {
          font-size: 14px;
        }

        .client {
          font-size: 18px;
        }

        .client-icon {
          width: 42px;
          height: 42px;
        }

        .question {
          font-size: 18px;
          padding: 18px;
          border-radius: 18px;
        }

        .meta-bottom {
          font-size: 13px;
        }

        textarea {
          height: 47px;
          font-size: 14px;
          padding: 14px;
          text-align: center;
        }

        .send-btn {
          font-size: 15px;
          padding: 5px;
          display: block;
          margin: 14px auto 0;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <div class="logo-area">
          
<a href="/" class="logo-full">
  <img src="logo.png" alt="CentralizeChat">
</a>

      </header>

<div class="stats-card">

  
  
  <div class="stats-left">


    
    <div class="stats-info">
      <h2>Perguntas Pendentes</h2>
      <div class="stats-number" id="totalQuestions">0</div>
      <div class="stats-sub">Aguardando resposta</div>
    </div>
  </div>

<button class="refresh-btn" onclick="location.reload()">
  ↻ 
</button>

</div>

<div id="questions">
  <div class="empty">Carregando perguntas...</div>
</div>

 

<div class="footer-menu">

  <div class="footer-item active" onclick="showTab('pending', this)">
    <div class="footer-icon">📥</div>
    <div>Pendentes</div>
  </div>

  <div class="footer-item" onclick="showTab('answered', this)">
    <div class="footer-icon">✅</div>
    <div>Respondidas</div>
  </div>

  <div class="footer-item" onclick="showTab('stats', this)">
    <div class="footer-icon">📊</div>
    <div>Estatísticas</div>
  </div>

  <div class="footer-item" onclick="showTab('settings', this)">
    <div class="footer-icon">⚙️</div>
    <div>Ajustes</div>
  </div>

</div>
    </div>

<script>
async function loadQuestions(){
  const container = document.getElementById('questions');

  if(!container){
    alert('Erro: não encontrei a div id="questions"');
    return;
  }

  container.innerHTML = '<div class="empty">Carregando perguntas...</div>';

  try{
    const response = await fetch('/api/questions');
    const data = await response.json();

    const questions = data.questions
      .filter(item => item.status === "UNANSWERED")
      .filter(item => item.hold === false)
      .filter(item => item.deleted_from_listing === false);

    document.getElementById('totalQuestions').innerText = questions.length;

    container.innerHTML = '';

    if(questions.length === 0){
      container.innerHTML = '<div class="empty">Nenhuma pergunta pendente no momento.</div>';
      return;
    }

    questions.forEach(item => {
      container.innerHTML += `
        <div class="question-card">
          <div class="top-row">
            <div class="store">🏪 ${item.store_name}</div>
            <div class="status">• PENDENTE</div>
          </div>

          <div class="product">
            ${item.product_thumbnail ? `
              <a href="${item.product_link || '#'}" target="_blank">
                <img src="${item.product_thumbnail}">
              </a>
            ` : ''}

            <div class="product-info">
              <div class="meta">
                <span class="sku">SKU ${item.product_sku || ''}</span>
                <span class="${item.product_quantity > 5 ? 'stock' : 'stock-low'}">
                  ${item.product_quantity || 0} Unidade Disponível
                </span>
              </div>

              <div class="product-title">
                ${item.product_title || item.item_id}
              </div>

              ${item.product_price ? `
                <div class="price">${formatPrice(item.product_price)}</div>
              ` : ''}
            </div>
          </div>

          <div class="client">
            <div class="client-icon">👤</div>
            ${
              item.client_name && item.client_name !== 'Cliente'
                ? `${item.client_name} ${item.client_nickname ? `(${item.client_nickname})` : ''}`
                : `${item.client_nickname || 'Cliente'}`
            }
          </div>

          <div class="question">${item.text}</div>

          <div class="meta-bottom">
            <span>🕒 Pergunta feita às ${formatDate(item.date_created)}</span>
            <span>⏳ Em aberto há ${timeAgo(item.date_created)}</span>
          </div>

          <div class="answer-box">
            <div class="answer-title">⬇ Responda o cliente abaixo</div>

            <textarea id="answer-${item.id}" placeholder="Digite sua resposta aqui..."></textarea>

            <button class="send-btn" onclick="sendAnswer('${item.id}', '${item.store_id}', this)">
              Responder ✓
            </button>
          </div>
        </div>
      `;
    });

  }catch(error){
    container.innerHTML = '<div class="empty">Erro ao carregar perguntas.</div>';
  }
}

async function sendAnswer(questionId, storeId, button){
  const textarea = document.getElementById(`answer-${questionId}`);
  const text = textarea.value.trim();

  if(!text){
    alert('Digite uma resposta.');
    return;
  }

  button.disabled = true;
  button.innerText = 'Enviando...';

  try{
    const response = await fetch('/api/answer', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        question_id: questionId,
        store_id: storeId,
        text
      })
    });

    const data = await response.json();

    if(data.success){
      button.innerText = 'Respondido ✓';
      setTimeout(() => {
        loadQuestions();
      }, 1000);
    }else{
      alert('Erro ao responder.');
      button.disabled = false;
      button.innerText = 'Responder ✓';
    }

  }catch(error){
    alert('Erro no sistema.');
    button.disabled = false;
    button.innerText = 'Responder ✓';
  }
}

function formatDate(dateString){
  const date = new Date(dateString);
  return date.toLocaleTimeString('pt-BR', {
    hour:'2-digit',
    minute:'2-digit'
  });
}

function timeAgo(dateString){
  const now = new Date();
  const created = new Date(dateString);
  const diffMs = now - created;
  const minutes = Math.floor(diffMs / 60000);

  if(minutes < 1) return 'agora';
  if(minutes < 60) return `${minutes} min`;

  const hours = Math.floor(minutes / 60);
  if(hours < 24) return `${hours}h`;

  const days = Math.floor(hours / 24);
  return `${days}d`;
}

function formatPrice(value){
  return Number(value).toLocaleString('pt-BR', {
    style:'currency',
    currency:'BRL'
  });
}

loadQuestions();

async function showTab(tab, element){

  document.querySelectorAll('.footer-item').forEach(item => {
    item.classList.remove('active');
  });

  element.classList.add('active');

  const container = document.getElementById('questions');

  if(tab === 'pending'){
    loadQuestions();
    return;
  }

  if(tab === 'answered'){

    container.innerHTML = `
      <div class="empty">
        Carregando perguntas respondidas...
      </div>
    `;

    try{

      const response = await fetch('/api/answered');
      const data = await response.json();

      const questions = data.questions || [];

      container.innerHTML = '';

      if(questions.length === 0){
        container.innerHTML = `
          <div class="empty">
            Nenhuma pergunta respondida.
          </div>
        `;
        return;
      }

      questions.forEach(item => {

        container.innerHTML += `
          <div class="question-card">

            <div class="top-row">
              <div class="store">
                🏪 ${item.store_name}
              </div>

              <div class="status" style="background:#052e16;color:#22c55e;">
                ✓ RESPONDIDA
              </div>
            </div>

            <div class="client">
              <div class="client-icon">👤</div>
              ${
  item.client_name && item.client_name !== 'Cliente'
    ? `${item.client_name} ${item.client_nickname ? `(${item.client_nickname})` : ''}`
    : `${item.client_nickname || 'Cliente'}`
}
            </div>

            <div class="question">
              ${item.text}
            </div>

            <div class="answer-box">

              <div class="answer-title">
                Resposta enviada:
              </div>

              <div class="question" style="border-left-color:#22c55e;">
                ${item.answer?.text || 'Sem resposta'}
              </div>

            </div>

            <div class="meta-bottom">
              <span>
                🕒 Respondida às
                ${formatDate(item.answer?.date_created)}
              </span>
            </div>

          </div>
        `;

      });

    }catch(error){

      container.innerHTML = `
        <div class="empty">
          Erro ao carregar perguntas respondidas.
        </div>
      `;

    }

    return;
  }

if(tab === 'stats'){

  container.innerHTML = `
    <div class="empty">Carregando estatísticas...</div>
  `;

  try{
    const response = await fetch('/api/stats?period=day');
    const data = await response.json();

    const users = Object.entries(data.by_user || {});

    container.innerHTML = `
      <div class="question-card">

        <div class="product-title">
          📊 Estatísticas de hoje
        </div>

        <div class="question">
          Total de respostas hoje: <strong>${data.total}</strong>
        </div>

        <div class="answer-box">
          <div class="answer-title">
            Respostas por usuário
          </div>

          ${
            users.length === 0
              ? `<div class="previous-answer">Nenhuma resposta registrada hoje.</div>`
              : users.map(([email, total]) => `
                  <div class="previous-item">
                    <div class="previous-question">${email}</div>
                    <div class="previous-answer">${total} resposta(s)</div>
                  </div>
                `).join('')
          }
        </div>

      </div>
    `;

  }catch(error){

    container.innerHTML = `
      <div class="empty">
        Erro ao carregar estatísticas.
      </div>
    `;

  }

  return;
}
  if(tab === 'settings'){

    container.innerHTML = `
      <div class="question-card">

        <div class="product-title">
          ⚙️ Ajustes
        </div>

        <div class="question">
          • Notificações
          <br>
          • Sons
          <br>
          • Lojas integradas
          <br>
          • Integrações Mercado Livre/Shopee
          <br>
          • Configurações da conta
        </div>

      </div>
    `;

  }

}

</script>

  </body>
</html>
