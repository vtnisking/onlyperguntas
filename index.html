<div class="stats-card">

  
  
  <div class="stats-left">

<button class="refresh-btn" onclick="location.reload()">
  ↻

<script>

const loggedUser = JSON.parse(
  localStorage.getItem("centralizachat_user")
);

if(!loggedUser){
  window.location.href = "/login.html";
}

function logout(){
  localStorage.removeItem("centralizachat_user");
  window.location.href = "/login.html";
}

window.logout = logout;

let knownQuestionIds = new Set();
let firstLoadDone = false;

async function requestNotificationPermission(){

  try{
    if(!("Notification" in window)){
      alert("Este navegador não suporta notificações.");
      return;
    }

    if(!("serviceWorker" in navigator)){
      alert("Service Worker não suportado.");
      return;
    }

    const permission = await Notification.requestPermission();

    if(permission !== "granted"){
      alert("Notificações não permitidas.");
      return;
    }

    const registration = await navigator.serviceWorker.ready;

    const subscription = await registration.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(
        "BC_KYGVTkWCoFjiLrG9ID7MoXoXt8Y05cmFkbPIacOYeQ95tsU3sGsM50tNALd2KMyRjHHdJnCP5IqjMU13eoXA"
      )
    });

    const result = await fetch("/api/save-subscription", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        subscription,
        user_email:"admin@centralizachat.com"
      })
    });

    const saved = await result.json();

    alert(JSON.stringify(saved));

  }catch(error){
    alert("Erro ao ativar notificações: " + error.message);
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);

  const base64 = (base64String + padding)
    .replace(/-/g, "+")
    .replace(/_/g, "/");

  const rawData = window.atob(base64);

  return Uint8Array.from([...rawData].map(char => char.charCodeAt(0)));
}


async function loadQuestions(silent = false){
  const container = document.getElementById('questions');

  if(!container){
    alert('Erro: não encontrei a div id="questions"');
    return;
  }

if(!silent){
  container.innerHTML = '<div class="empty">Carregando perguntas...</div>';
}

  try{
const response = await fetch(
  `/api/questions?company_id=${loggedUser.company_id}`
);
    const data = await response.json();

    const questions = data.questions
      .filter(item => item.status === "UNANSWERED")
      .filter(item => item.hold === false)
      .filter(item => item.deleted_from_listing === false);

      const currentIds = questions.map(item => String(item.id));

if(firstLoadDone){
  const hasNewQuestion = currentIds.some(id => !knownQuestionIds.has(id));

if(hasNewQuestion){

  if(typeof notifyNewQuestion === "function"){
    notifyNewQuestion();
  }

  playNotificationSound();

}

}

knownQuestionIds = new Set(currentIds);
firstLoadDone = true;

    document.getElementById('totalQuestions').innerText = questions.length;

    container.innerHTML = '';

 if(questions.length === 0){
  container.innerHTML = `
    <div class="empty">
      Nenhuma pergunta pendente no momento.
    </div>

    <div id="monthlyRanking">
      Carregando ranking...
    </div>
  `;

  loadMonthlyRanking();
  return;
}
    questions.forEach(item => {
      container.innerHTML += `
        <div class="question-card">
          <div class="top-row">
            <div class="store">🏪 ${item.store_name}</div>
            <div class="status">• PENDENTE</div>
          </div>

          <div class="product">
            ${item.product_thumbnail ? `
              <a href="${item.product_link || '#'}" target="_blank">
                <img src="${item.product_thumbnail}">
              </a>
            ` : ''}

            <div class="product-info">
              <div class="meta">
                <span class="sku">SKU ${item.product_sku || ''}</span>
                <span class="${item.product_quantity > 5 ? 'stock' : 'stock-low'}">
                  ${item.product_quantity || 0} Unidade Disponível
                </span>
              </div>

              <div class="product-title">
                ${item.product_title || item.item_id}
              </div>

              ${item.product_price ? `
                <div class="price">${formatPrice(item.product_price)}</div>
              ` : ''}
            </div>
          </div>

          <div class="client">
            <div class="client-icon">👤</div>
            ${
              item.client_name && item.client_name !== 'Cliente'
                ? `${item.client_name} ${item.client_nickname ? `(${item.client_nickname})` : ''}`
                : `${item.client_nickname || 'Cliente'}`
            }
          </div>

          <div class="question">${item.text}</div>

          <div class="meta-bottom">
            <span>🕒 Pergunta feita às ${formatDate(item.date_created)}</span>
            <span>⏳ Em aberto há ${timeAgo(item.date_created)}</span>
          </div>

          ${renderPreviousQuestions(item)}

          <div class="answer-box">
            <div class="answer-title">⬇ Responda o cliente abaixo</div>

            <textarea id="answer-${item.id}" placeholder="Digite sua resposta aqui..."></textarea>

            <button class="send-btn" onclick="sendAnswer('${item.id}', '${item.store_id}', this)">
              Responder ✓
            </button>
          </div>

        </div>
      `;
    });

  }catch(error){
    container.innerHTML = '<div class="empty">Erro ao carregar perguntas.</div>';
  }
}

async function sendAnswer(questionId, storeId, button){
  const textarea = document.getElementById(`answer-${questionId}`);
  const text = textarea.value.trim();

  if(!text){
    alert('Digite uma resposta.');
    return;
  }

  button.disabled = true;
  button.innerText = 'Enviando...';

  try{
    const response = await fetch('/api/answer', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
      question_id: questionId,
      store_id: storeId,
      text,
      user_id: loggedUser.id,
      user_name: loggedUser.name,
      user_email: loggedUser.email
    })
    });

    const data = await response.json();

    if(data.success){
      button.innerText = 'Respondido ✓';
      setTimeout(() => {
        loadQuestions();
      }, 1000);
    }else{
      alert('Erro ao responder.');
      button.disabled = false;
      button.innerText = 'Responder ✓';
    }

  }catch(error){
    alert('Erro no sistema.');
    button.disabled = false;
    button.innerText = 'Responder ✓';
  }
}

function renderPreviousQuestions(item){
  const previous = item.previous_questions || [];

  if(previous.length === 0){
    return '';
  }

  const html = previous.map(q => `
    <div class="previous">
      <div style="color:white;margin-bottom:8px;">
        ${q.text}
      </div>

      ${q.answer ? `
        <div style="color:#22c55e;font-size:14px;">
          Resposta: ${q.answer}
        </div>
      ` : ''}

      <div style="color:#9ca3af;font-size:12px;margin-top:6px;">
        ${formatDate(q.date_created)} • ${q.status === 'ANSWERED' ? 'Respondida' : 'Pendente'}
      </div>
    </div>
  `).join('');

  return `
    <button
      class="previous"
      onclick="togglePrevious('${item.id}')"
      type="button"
      style="width:100%;cursor:pointer;"
    >
      Ver perguntas anteriores (${previous.length})
    </button>

    <div id="previous-${item.id}" style="display:none;">
      ${html}
    </div>
  `;
}

function togglePrevious(questionId){
  const box = document.getElementById(`previous-${questionId}`);

  if(!box){
    return;
  }

  box.style.display =
    box.style.display === 'block'
      ? 'none'
      : 'block';
}

function formatDate(dateString){
  if(!dateString){
    return '--:--';
  }

  const date = new Date(dateString);

  return date.toLocaleTimeString('pt-BR', {
    hour:'2-digit',
    minute:'2-digit'
  });
}

function timeAgo(dateString){
  const now = new Date();
  const created = new Date(dateString);
  const diffMs = now - created;
  const minutes = Math.floor(diffMs / 60000);

  if(minutes < 1) return 'agora';
  if(minutes < 60) return `${minutes} min`;

  const hours = Math.floor(minutes / 60);
  if(hours < 24) return `${hours}h`;

  const days = Math.floor(hours / 24);
  return `${days}d`;
}

function formatPrice(value){
  return Number(value).toLocaleString('pt-BR', {
    style:'currency',
    currency:'BRL'
  });
}

let currentTab = "pending";

window.requestNotificationPermission = requestNotificationPermission;
window.togglePrevious = togglePrevious;

loadQuestions();

setInterval(() => {

  const typing =
    document.activeElement &&
    document.activeElement.tagName === "TEXTAREA";

if(!typing){
  loadQuestions(true);
}

}, 60000);

async function showTab(tab, element){

currentTab = tab;

  document.querySelectorAll('.footer-item').forEach(item => {
    item.classList.remove('active');
  });

  element.classList.add('active');

  const container = document.getElementById('questions');

  if(tab === 'pending'){
    loadQuestions();
    return;
  }

  if(tab === 'answered'){

    container.innerHTML = `
      <div class="empty">
        Carregando perguntas respondidas...
      </div>
    `;

    try{

      const response = await fetch('/api/answered');
      const data = await response.json();

      const questions = data.questions || [];

      container.innerHTML = '';

      if(questions.length === 0){
        container.innerHTML = `
          <div class="empty">
            Nenhuma pergunta respondida.
          </div>
        `;
        return;
      }

      questions.forEach(item => {

        container.innerHTML += `
          <div class="question-card">

            <div class="top-row">
              <div class="store">
                🏪 ${item.store_name}
              </div>

              <div class="status" style="background:#052e16;color:#22c55e;">
                ✓ RESPONDIDA
              </div>
            </div>

            <div class="client">
              <div class="client-icon">👤</div>
              ${
  item.client_name && item.client_name !== 'Cliente'
    ? `${item.client_name} ${item.client_nickname ? `(${item.client_nickname})` : ''}`
    : `${item.client_nickname || 'Cliente'}`
}
            </div>

            <div class="question">
              ${item.text}
            </div>

            <div class="answer-box">

              <div class="answer-title">
                Resposta enviada:

let calendarStart = null;
let calendarEnd = null;
let calendarMonth = new Date();

function openCalendarBox(){
  const box = document.getElementById("calendarBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
  renderCalendar();
}

function renderCalendar(){
  const box = document.getElementById("calendarBox");
  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  const monthName = calendarMonth.toLocaleDateString("pt-BR", {
    month: "long"
  });

  let days = "";

  for(let i = 0; i < firstDay; i++){
    days += `<div></div>`;
  }

  for(let day = 1; day <= lastDate; day++){
    const date = `${year}-${String(month + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

    const active =
      date === calendarStart || date === calendarEnd
        ? "background:#2563eb;color:white;border-radius:50%;"
        : "";

    days += `
      <div onclick="selectCalendarDate('${date}')" style="
        padding:10px;
        text-align:center;
        cursor:pointer;
        font-weight:bold;
        ${active}
      ">
        ${day}
      </div>
    `;
  }

  box.innerHTML = `
    <div style="
      background:white;
      color:black;
      border-radius:18px;
      padding:18px;
      margin-top:14px;
    ">

      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        font-weight:bold;
        font-size:18px;
        margin-bottom:18px;
      ">
        <button onclick="changeCalendarMonth(-1)">‹</button>
        <span>${monthName}</span>
        <button onclick="changeCalendarMonth(1)">›</button>
      </div>

      <div style="
        display:grid;
        grid-template-columns:repeat(7,1fr);
        gap:8px;
        text-align:center;
        margin-bottom:8px;
      ">
        <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
      </div>

      <div style="
        display:grid;
        grid-template-columns:repeat(7,1fr);
        gap:8px;
      ">
        ${days}
      </div>

      <button class="send-btn" onclick="applyCalendarPeriod()">
        Aplicar período
      </button>

    </div>
  `;
}

function selectCalendarDate(date){
  if(!calendarStart || calendarEnd){
    calendarStart = date;
    calendarEnd = null;
  }else{
    calendarEnd = date;
  }

  renderCalendar();
}

function changeCalendarMonth(value){
  calendarMonth.setMonth(calendarMonth.getMonth() + value);
  renderCalendar();
}

function applyCalendarPeriod(){
 if(!calendarStart){
  alert("Selecione uma data.");
  return;
}

if(!calendarEnd){
  calendarEnd = calendarStart;
}

  document.getElementById("statsPeriod").value = "custom";

  document.getElementById("selectedPeriodText").innerText =
    `${calendarStart} até ${calendarEnd}`;

  document.getElementById("calendarBox").style.display = "none";

  loadStats();
}

window.openCalendarBox = openCalendarBox;
window.selectCalendarDate = selectCalendarDate;
window.changeCalendarMonth = changeCalendarMonth;
window.applyCalendarPeriod = applyCalendarPeriod;

let audioUnlocked = false;

document.addEventListener("click", () => {

  if(audioUnlocked){
    return;
  }

  const audio =
    document.getElementById("notificationSound");

  if(audio){

    audio.volume = 0;

    audio.play()
      .then(() => {

        audio.pause();
        audio.currentTime = 0;
        audio.volume = 1;

        audioUnlocked = true;

      })
      .catch(() => {});

  }

}, { once:true });

function playNotificationSound(){
  const audio = document.getElementById("notificationSound");

  if(!audio){
    return;
  }

  audio.currentTime = 0;

  audio.play().catch(() => {
    console.log("Som bloqueado até o usuário interagir com o app.");
  });
}
